<!DOCTYPE html>
<html>
<head>
    <title>Expense Breakdown</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .nav {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav button {
            margin: 5px;
            padding: 12px 24px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        canvas {
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .nav button {
                padding: 8px 16px;
                font-size: 12px;
            }
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Monthly Expense Breakdown</h1>
        </div>
        
        <div class="card">
            <div class="nav">
                <button onclick="showAllExpenses()">All Expenses</button>
                <button onclick="showFood()">🍔 Food Only</button>
                <button onclick="showTransport()">🚗 Transport Only</button>
                <button onclick="showRent()">🏠 Rent Only</button>
                <button onclick="showFun()">🎬 Entertainment</button>
                <button onclick="showShopping()">🛍️ Shopping</button>
            </div>
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem("financeData"));
        let currentChart = null;

        if (!data || !data.results) {
            document.getElementById("lineChart").innerHTML = "No data available. Please fill the form first.";
        } else {
            let labels = [];
            let food = [];
            let transport = [];
            let rent = [];
            let fun = [];
            let shopping = [];

            data.results.forEach(m => {
                labels.push("Month " + m.month);
                food.push(m.food);
                transport.push(m.transport);
                rent.push(m.rent);
                fun.push(m.fun);
                shopping.push(m.shopping);
            });

            function createChart(datasets) {
                if (currentChart) currentChart.destroy();
                currentChart = new Chart(document.getElementById("lineChart"), {
                    type: "line",
                    data: { labels: labels, datasets: datasets },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: { mode: 'index', intersect: false }
                        },
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: 'Amount (₹)' } },
                            x: { title: { display: true, text: 'Months' } }
                        }
                    }
                });
            }

            window.showAllExpenses = function() {
                createChart([
                    { label: "Food", data: food, borderColor: "#FF6384", fill: false, tension: 0.1 },
                    { label: "Transport", data: transport, borderColor: "#36A2EB", fill: false, tension: 0.1 },
                    { label: "Rent", data: rent, borderColor: "#FFCE56", fill: false, tension: 0.1 },
                    { label: "Entertainment", data: fun, borderColor: "#4BC0C0", fill: false, tension: 0.1 },
                    { label: "Shopping", data: shopping, borderColor: "#9966FF", fill: false, tension: 0.1 }
                ]);
            }

            window.showFood = function() {
                createChart([{ label: "Food", data: food, borderColor: "#FF6384", fill: false, tension: 0.1 }]);
            }
            window.showTransport = function() {
                createChart([{ label: "Transport", data: transport, borderColor: "#36A2EB", fill: false, tension: 0.1 }]);
            }
            window.showRent = function() {
                createChart([{ label: "Rent", data: rent, borderColor: "#FFCE56", fill: false, tension: 0.1 }]);
            }
            window.showFun = function() {
                createChart([{ label: "Entertainment", data: fun, borderColor: "#4BC0C0", fill: false, tension: 0.1 }]);
            }
            window.showShopping = function() {
                createChart([{ label: "Shopping", data: shopping, borderColor: "#9966FF", fill: false, tension: 0.1 }]);
            }

            showAllExpenses();
        }
    </script>
</body>
</html>
