<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
<h1>Savings vs Expenses</h1>

<canvas id="lineChart"></canvas>

</div>

<script>

let data=JSON.parse(localStorage.getItem("financeData"));

let labels=[];
let expenses=[];
let savings=[];

data.results.forEach(m=>{
labels.push("Month "+m.month);
expenses.push(m.expense);
savings.push(m.saved);
});

new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Expense",data:expenses},
{label:"Saved",data:savings}
]
}
});

</script>

</body>
</html>
